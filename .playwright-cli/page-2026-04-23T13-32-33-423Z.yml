              - heading "##Identity Verification pricing" [level=2] [ref=e244]
              - paragraph [ref=e245]: Identity Verification has a base fee for every verification attempted, as well as separate fees for Data Source verification, Selfie checks, and Document checks. For more details, see the Identity Verification fee model . To view the exact pricing you may be eligible for, apply for Production access or contact Sales .

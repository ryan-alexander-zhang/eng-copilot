<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eng-copilot Clipper</title>
    <style>
      body {
        margin: 0;
        min-width: 320px;
        background: #f8fafc;
        color: #0f172a;
        font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        padding: 16px;
      }

      .card {
        border: 1px solid #dbe3ee;
        border-radius: 16px;
        background: #ffffff;
        padding: 16px;
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.06);
      }

      .label {
        margin: 0;
        color: #64748b;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .title {
        margin: 8px 0 0;
        font-size: 18px;
        font-weight: 700;
      }

      .url {
        margin: 8px 0 0;
        color: #475569;
        font-size: 12px;
        word-break: break-all;
      }

      .status {
        margin-top: 14px;
        border-radius: 12px;
        background: #f8fafc;
        padding: 12px;
        color: #475569;
      }

      .status[data-tone="error"] {
        background: #fff1f2;
        color: #be123c;
      }

      .status[data-tone="success"] {
        background: #ecfdf5;
        color: #047857;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 12px;
        cursor: pointer;
        font: inherit;
      }

      .primary {
        flex: 1;
        min-height: 42px;
        background: #2563eb;
        color: white;
        font-weight: 600;
      }

      .secondary {
        min-height: 42px;
        padding: 0 14px;
        background: #e2e8f0;
        color: #0f172a;
        font-weight: 600;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <p class="label">Current page</p>
        <h1 class="title" id="page-title">Loading…</h1>
        <p class="url" id="page-url"></p>
        <div class="status" id="status">Checking page and clipper settings…</div>
        <div class="actions">
          <button class="primary" id="clip-button" type="button">Clip page</button>
          <button class="secondary" id="settings-button" type="button">Settings</button>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>

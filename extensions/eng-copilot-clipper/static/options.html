<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eng-copilot Clipper Settings</title>
    <style>
      body {
        margin: 0;
        background: #f8fafc;
        color: #0f172a;
        font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 32px 20px;
      }

      .card {
        border: 1px solid #dbe3ee;
        border-radius: 20px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.06);
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      p {
        color: #475569;
      }

      label {
        display: block;
        margin-top: 18px;
        font-weight: 600;
      }

      input {
        width: 100%;
        min-height: 44px;
        margin-top: 8px;
        box-sizing: border-box;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 0 14px;
        font: inherit;
      }

      .hint {
        margin-top: 8px;
        font-size: 12px;
      }

      .actions {
        margin-top: 20px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 12px;
        min-height: 44px;
        padding: 0 18px;
        cursor: pointer;
        background: #2563eb;
        color: white;
        font: inherit;
        font-weight: 600;
      }

      .status {
        margin-top: 16px;
        border-radius: 12px;
        background: #f8fafc;
        padding: 12px;
        color: #475569;
      }

      .status[data-tone="error"] {
        background: #fff1f2;
        color: #be123c;
      }

      .status[data-tone="success"] {
        background: #ecfdf5;
        color: #047857;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>eng-copilot Clipper</h1>
        <p>Configure the eng-copilot base URL and your Web Clipper token from Settings → Security.</p>
        <form id="settings-form">
          <label for="server-base-url">Server base URL</label>
          <input id="server-base-url" name="serverBaseUrl" placeholder="https://your-eng-copilot.example.com" type="url" />
          <p class="hint">Use the site root, for example <code>http://localhost:3000</code>. Use the same origin you sign into, and do not mix <code>localhost</code> with <code>127.0.0.1</code>.</p>

          <label for="clipper-token">Clipper token</label>
          <input id="clipper-token" name="clipperToken" placeholder="ecp_..." type="password" />

          <div class="actions">
            <button type="submit">Save settings</button>
          </div>
        </form>
        <div class="status" id="status">Load your app URL and token to start clipping.</div>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>

services:
  postgres:
    image: postgres:18.3
    restart: unless-stopped
    environment:
      POSTGRES_DB: eng_copilot
      POSTGRES_USER: eng_copilot
      POSTGRES_PASSWORD: eng_copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eng_copilot -d eng_copilot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
